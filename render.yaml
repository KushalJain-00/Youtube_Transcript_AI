# Render Blueprint — auto-configures the service on render.com
# Deploy: Connect your GitHub repo → Render detects this file automatically.

services:
  - type: web
    name: ytai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.3
    healthCheckPath: /health
